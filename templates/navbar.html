<nav class="top-navbar">
  <a href="/" class="logo-full"><img src="/logo.svg" alt="Efficient Hypothesis" style="height:28px"></a>
  <div class="nav-links">
    {% if session.get("user") %}
      <button class="nav-action" type="button" data-modal-target="navbar-instructions-modal">Instructions</button>
    {% else %}
      <a href="/login">Sign In</a>
    {% endif %}
  </div>
</nav>

{% if session.get("user") %}
  <div class="nav-modal-backdrop" id="navbar-instructions-modal" hidden>
    <div class="nav-modal" role="dialog" aria-modal="true" aria-labelledby="navbar-instructions-title">
      <div class="nav-modal-top">
        <div class="nav-modal-title" id="navbar-instructions-title">Instructions</div>
        <button class="nav-modal-close" type="button" data-modal-close>Close</button>
      </div>
      <div class="nav-modal-body nav-instructions-body">
        <section>
          <h3>Home</h3>
          <p>Use Home for tasks, websites, subscriptions, tags, and entity references.</p>
        </section>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/navbar.js') }}" defer></script>
{% endif %}
